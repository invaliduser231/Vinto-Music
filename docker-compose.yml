services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - bgutil-pot
      - nodelink
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=1024 --openssl-legacy-provider}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB: ${MONGODB_DB:-fluxer_music_bot}
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-20}
      MONGODB_MIN_POOL_SIZE: ${MONGODB_MIN_POOL_SIZE:-2}
      MONGODB_CONNECT_TIMEOUT_MS: ${MONGODB_CONNECT_TIMEOUT_MS:-10000}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS:-10000}
      MONGODB_PING_INTERVAL_MS: ${MONGODB_PING_INTERVAL_MS:-15000}
      GUILD_CONFIG_CACHE_TTL_MS: ${GUILD_CONFIG_CACHE_TTL_MS:-60000}
      GUILD_CONFIG_CACHE_MAX_SIZE: ${GUILD_CONFIG_CACHE_MAX_SIZE:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_BASE: ${API_BASE:-https://api.fluxer.app/v1}
      GATEWAY_URL: ${GATEWAY_URL:-wss://gateway.fluxer.app}
      GATEWAY_INTENTS: ${GATEWAY_INTENTS:-0}
      GATEWAY_PRESENCE_ENABLED: ${GATEWAY_PRESENCE_ENABLED:-0}
      DNS_RESULT_ORDER: ${DNS_RESULT_ORDER:-ipv4first}
      AUTO_GATEWAY_URL: ${AUTO_GATEWAY_URL:-1}
      GATEWAY_ONLY_MODE: ${GATEWAY_ONLY_MODE:-0}
      ENABLE_EMBEDS: ${ENABLE_EMBEDS:-1}
      ALLOW_DEFAULT_PREFIX_FALLBACK: ${ALLOW_DEFAULT_PREFIX_FALLBACK:-0}
      NODELINK_ENABLED: ${NODELINK_ENABLED:-1}
      NODELINK_BASE_URL: ${NODELINK_BASE_URL:-http://nodelink:3000}
      NODELINK_PASSWORD: ${NODELINK_PASSWORD:-youshallnotpass}
      NODELINK_DEFAULT_SEARCH: ${NODELINK_DEFAULT_SEARCH:-search}
      NODELINK_ROUTING_MODE: ${NODELINK_ROUTING_MODE:-smart}
      NODELINK_REQUEST_TIMEOUT_MS: ${NODELINK_REQUEST_TIMEOUT_MS:-15000}
      NODELINK_STREAM_START_TIMEOUT_MS: ${NODELINK_STREAM_START_TIMEOUT_MS:-10000}
      PREFIX: ${PREFIX:-!}
      STRICT_STARTUP_CHECK: ${STRICT_STARTUP_CHECK:-0}
      API_CHECK_RETRIES: ${API_CHECK_RETRIES:-5}
      API_CHECK_DELAY_MS: ${API_CHECK_DELAY_MS:-1000}
      REST_TIMEOUT_MS: ${REST_TIMEOUT_MS:-10000}
      REST_MAX_RETRIES: ${REST_MAX_RETRIES:-4}
      REST_RETRY_BASE_DELAY_MS: ${REST_RETRY_BASE_DELAY_MS:-300}
      SESSION_IDLE_MS: ${SESSION_IDLE_MS:-300000}
      MAX_CONCURRENT_VOICE_CHANNELS_PER_GUILD: ${MAX_CONCURRENT_VOICE_CHANNELS_PER_GUILD:-5}
      SESSION_SNAPSHOT_MIN_WRITE_INTERVAL_MS: ${SESSION_SNAPSHOT_MIN_WRITE_INTERVAL_MS:-10000}
      SESSION_SNAPSHOT_FLUSH_INTERVAL_MS: ${SESSION_SNAPSHOT_FLUSH_INTERVAL_MS:-30000}
      SESSION_SNAPSHOT_MAX_PENDING_TRACKS: ${SESSION_SNAPSHOT_MAX_PENDING_TRACKS:-25}
      MAX_QUEUE_SIZE: ${MAX_QUEUE_SIZE:-100}
      MAX_PLAYLIST_TRACKS: ${MAX_PLAYLIST_TRACKS:-25}
      MAX_SAVED_PLAYLISTS_PER_GUILD: ${MAX_SAVED_PLAYLISTS_PER_GUILD:-100}
      MAX_SAVED_TRACKS_PER_PLAYLIST: ${MAX_SAVED_TRACKS_PER_PLAYLIST:-500}
      MAX_FAVORITES_PER_USER: ${MAX_FAVORITES_PER_USER:-500}
      PERSISTENT_HISTORY_SIZE: ${PERSISTENT_HISTORY_SIZE:-200}
      PLAY_COMMAND_COOLDOWN_MS: ${PLAY_COMMAND_COOLDOWN_MS:-2000}
      SEARCH_RESULT_LIMIT: ${SEARCH_RESULT_LIMIT:-5}
      SEARCH_PICK_TIMEOUT_MS: ${SEARCH_PICK_TIMEOUT_MS:-45000}
      PLAYBACK_DIAGNOSTICS_ENABLED: ${PLAYBACK_DIAGNOSTICS_ENABLED:-0}
      PLAYBACK_DIAGNOSTICS_INTERVAL_MS: ${PLAYBACK_DIAGNOSTICS_INTERVAL_MS:-1000}
      DEFAULT_VOLUME_PERCENT: ${DEFAULT_VOLUME_PERCENT:-100}
      MIN_VOLUME_PERCENT: ${MIN_VOLUME_PERCENT:-0}
      MAX_VOLUME_PERCENT: ${MAX_VOLUME_PERCENT:-200}
      VOICE_MAX_BITRATE: ${VOICE_MAX_BITRATE:-128000}
      MEMORY_TELEMETRY_INTERVAL_MS: ${MEMORY_TELEMETRY_INTERVAL_MS:-15000}
      MEMORY_TELEMETRY_LOG_INTERVAL_MS: ${MEMORY_TELEMETRY_LOG_INTERVAL_MS:-300000}
      MEMORY_RSS_EXIT_MB: ${MEMORY_RSS_EXIT_MB:-1536}
      HEAP_SNAPSHOT_SIGNAL_ENABLED: ${HEAP_SNAPSHOT_SIGNAL_ENABLED:-1}
      HEAP_SNAPSHOT_DIR: ${HEAP_SNAPSHOT_DIR:-.heap-snapshots}
      DEFAULT_DEDUPE_ENABLED: ${DEFAULT_DEDUPE_ENABLED:-0}
      DEFAULT_247_ENABLED: ${DEFAULT_247_ENABLED:-0}
      VOTE_SKIP_RATIO: ${VOTE_SKIP_RATIO:-0.5}
      VOTE_SKIP_MIN_VOTES: ${VOTE_SKIP_MIN_VOTES:-2}
      ENABLE_YT_SEARCH: ${ENABLE_YT_SEARCH:-1}
      ENABLE_YT_PLAYBACK: ${ENABLE_YT_PLAYBACK:-1}
      ENABLE_SPOTIFY_IMPORT: ${ENABLE_SPOTIFY_IMPORT:-1}
      ENABLE_DEEZER_IMPORT: ${ENABLE_DEEZER_IMPORT:-1}
      ENABLE_TIDAL_IMPORT: ${ENABLE_TIDAL_IMPORT:-1}
      ENABLE_YOUTUBE_PREFETCHED_PLAYBACK: ${ENABLE_YOUTUBE_PREFETCHED_PLAYBACK:-0}
      APPLE_MUSIC_MEDIA_API_TOKEN: ${APPLE_MUSIC_MEDIA_API_TOKEN:-}
      APPLE_MUSIC_AUTO_TOKEN: ${APPLE_MUSIC_AUTO_TOKEN:-1}
      APPLE_MUSIC_MARKET: ${APPLE_MUSIC_MARKET:-US}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:-}
      SPOTIFY_MARKET: ${SPOTIFY_MARKET:-US}
      TIDAL_TOKEN: ${TIDAL_TOKEN:-}
      TIDAL_COUNTRY_CODE: ${TIDAL_COUNTRY_CODE:-US}
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID:-}
      SOUNDCLOUD_AUTO_CLIENT_ID: ${SOUNDCLOUD_AUTO_CLIENT_ID:-1}
      DEEZER_ARL: ${DEEZER_ARL:-}
      DEEZER_TRACK_FORMATS: ${DEEZER_TRACK_FORMATS:-MP3_128,MP3_64}
      STRICT_MEDIA_AUTH: ${STRICT_MEDIA_AUTH:-0}
      FFMPEG_BIN: /usr/bin/ffmpeg
      YTDLP_BIN: /usr/local/bin/yt-dlp
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YTDLP_COOKIES_FROM_BROWSER: ${YTDLP_COOKIES_FROM_BROWSER:-}
      YTDLP_YOUTUBE_CLIENT: ${YTDLP_YOUTUBE_CLIENT:-mweb}
      YTDLP_EXTRA_ARGS: ${YTDLP_EXTRA_ARGS:---plugin-dirs,/etc/yt-dlp/plugins,--js-runtimes,node,--remote-components,ejs:github,--extractor-args,youtubepot-bgutilhttp:base_url=http://bgutil-pot:4416}
      YTDLP_PROXY_URL: ${YTDLP_PROXY_URL:-}
      YOUTUBE_PLAYLIST_RESOLVER: ${YOUTUBE_PLAYLIST_RESOLVER:-ytdlp}
      COMMAND_RATE_LIMIT_ENABLED: ${COMMAND_RATE_LIMIT_ENABLED:-1}
      COMMAND_USER_WINDOW_MS: ${COMMAND_USER_WINDOW_MS:-10000}
      COMMAND_USER_MAX: ${COMMAND_USER_MAX:-8}
      COMMAND_GUILD_WINDOW_MS: ${COMMAND_GUILD_WINDOW_MS:-10000}
      COMMAND_GUILD_MAX: ${COMMAND_GUILD_MAX:-40}
      COMMAND_RATE_LIMIT_BYPASS: ${COMMAND_RATE_LIMIT_BYPASS:-help,ping}
      MONITORING_ENABLED: ${MONITORING_ENABLED:-1}
      MONITORING_HOST: 0.0.0.0
      MONITORING_PORT: ${MONITORING_PORT:-9091}
      UNHEALTHY_EXIT_ENABLED: ${UNHEALTHY_EXIT_ENABLED:-1}
      UNHEALTHY_EXIT_AFTER_MS: ${UNHEALTHY_EXIT_AFTER_MS:-180000}
      UNHEALTHY_CHECK_INTERVAL_MS: ${UNHEALTHY_CHECK_INTERVAL_MS:-5000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      BOT_OWNER_USER_ID: ${BOT_OWNER_USER_ID:-}
      AUDD_API_TOKEN: ${AUDD_API_TOKEN:-}
    volumes:
      - /vinto/cookies.txt:/app/cookies.txt:ro
    ports:
      - "${MONITORING_PORT:-9091}:${MONITORING_PORT:-9091}"
    logging:
      driver: json-file
      options:
        max-size: ${APP_LOG_MAX_SIZE:-50m}
        max-file: ${APP_LOG_MAX_FILE:-5}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('node:http');const port=process.env.MONITORING_PORT||9091;http.get({host:'127.0.0.1',port,path:'/readyz'},(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-fluxer_music_bot}
    volumes:
      - mongo_data:/data/db
    logging:
      driver: json-file
      options:
        max-size: ${MONGO_LOG_MAX_SIZE:-25m}
        max-file: ${MONGO_LOG_MAX_FILE:-3}
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  bgutil-pot:
    image: ${BGUTIL_POT_PROVIDER_IMAGE:-brainicism/bgutil-ytdlp-pot-provider:1.3.1-node}
    restart: unless-stopped
    expose:
      - "4416"
    logging:
      driver: json-file
      options:
        max-size: ${BGUTIL_POT_LOG_MAX_SIZE:-10m}
        max-file: ${BGUTIL_POT_LOG_MAX_FILE:-3}

  nodelink:
    image: ${NODELINK_IMAGE:-performanc/nodelink:latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODELINK_SERVER_HOST: 0.0.0.0
      NODELINK_SERVER_PORT: "3000"
      NODELINK_SERVER_PASSWORD: ${NODELINK_PASSWORD:-youshallnotpass}
      NODELINK_ENABLELOADSTREAMENDPOINT: "true"
      NODELINK_ENABLETRACKSTREAMENDPOINT: "false"
      NODELINK_MAXSEARCHRESULTS: ${NODELINK_MAXSEARCHRESULTS:-10}
      NODELINK_MAXALBUMPLAYLISTLENGTH: ${MAX_PLAYLIST_TRACKS:-25}
      NODELINK_SOURCES_SPOTIFY_ENABLED: "true"
      NODELINK_SOURCES_SPOTIFY_CLIENTID: ${SPOTIFY_CLIENT_ID:-}
      NODELINK_SOURCES_SPOTIFY_CLIENTSECRET: ${SPOTIFY_CLIENT_SECRET:-}
      NODELINK_SOURCES_SPOTIFY_MARKET: ${SPOTIFY_MARKET:-US}
      NODELINK_SOURCES_DEEZER_ARL: ${DEEZER_ARL:-}
      NODELINK_SOURCES_APPLEMUSIC_MEDIAAPITOKEN: ${APPLE_MUSIC_MEDIA_API_TOKEN:-}
      NODELINK_SOURCES_APPLEMUSIC_MARKET: ${APPLE_MUSIC_MARKET:-US}
      NODELINK_SOURCES_APPLEMUSIC_PLAYLISTLOADLIMIT: ${MAX_PLAYLIST_TRACKS:-25}
      NODELINK_SOURCES_APPLEMUSIC_ALBUMLOADLIMIT: ${MAX_PLAYLIST_TRACKS:-25}
      NODELINK_SOURCES_TIDAL_TOKEN: ${TIDAL_TOKEN:-}
      NODELINK_SOURCES_TIDAL_COUNTRYCODE: ${TIDAL_COUNTRY_CODE:-US}
      NODELINK_SOURCES_SOUNDCLOUD_ENABLED: "true"
      NODELINK_SOURCES_YOUTUBE_ENABLED: "true"
      NODELINK_SOURCES_YOUTUBE_CIPHER_URL: ${NODELINK_SOURCES_YOUTUBE_CIPHER_URL:-https://cipher.kikkia.dev/api}
      NODELINK_SOURCES_YOUTUBE_PROXIES: ${NODELINK_SOURCES_YOUTUBE_PROXIES:-[]}
      NODELINK_DEFAULTSEARCHSOURCE: ${NODELINK_DEFAULTSEARCHSOURCE:-deezer,soundcloud,tidal,jiosaavn}
      NODELINK_UNIFIEDSEARCHSOURCES: ${NODELINK_UNIFIEDSEARCHSOURCES:-deezer,soundcloud,tidal,jiosaavn}
      NODELINK_SOURCES_YOUTUBE_FALLBACKSOURCES: ${NODELINK_SOURCES_YOUTUBE_FALLBACKSOURCES:-soundcloud,deezer,jiosaavn,tidal}
    volumes:
      - /vinto/nodelink/config.js:/app/config.js:ro
    logging:
      driver: json-file
      options:
        max-size: ${NODELINK_LOG_MAX_SIZE:-25m}
        max-file: ${NODELINK_LOG_MAX_FILE:-3}

volumes:
  mongo_data:
